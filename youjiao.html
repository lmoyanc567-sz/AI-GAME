<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼教专业成长评测-探险地图版</title>
    <style>
        :root {
            --bg: #F7F3E9;
            --primary: #FF8C69;
            --secondary: #4ECDC4;
            --text: #4A4A4A;
            --white: #FFFFFF;
            --grey: #D1D5DB;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(78, 205, 196, 0.6);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(78, 205, 196, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(78, 205, 196, 0);
            }
        }

        /* --- 全局星星荣誉栏 --- */
        .global-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 10px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .header-title {
            font-weight: 900;
            color: #8B4513;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .star-container {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .star {
            font-size: 22px;
            color: var(--grey);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .star.lit {
            color: #FFD700;
            transform: scale(1.25);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* --- 首页：大地图视图 --- */
        #map-screen {
            padding: 20px;
            padding-bottom: 80px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            animation: popIn 0.5s;
        }

        .map-intro {
            text-align: center;
            margin-bottom: 10px;
        }

        .map-intro h2 {
            color: var(--primary);
            margin: 0;
            font-size: 26px;
            font-weight: 900;
        }

        /* 无缝 SVG 矢量河流 */
        .river-container {
            position: relative;
            width: 100%;
            height: 420px;
            margin: 0 auto;
            max-width: 380px;
        }

        .river-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .line-seg {
            fill: none;
            stroke: var(--grey);
            stroke-width: 14px;
            stroke-linecap: round;
            stroke-dasharray: 14 24;
            /* 未解锁呈现寻宝虚线 */
            transition: stroke 0.6s, stroke-dasharray 0.6s;
        }

        .line-seg.lit {
            stroke: var(--secondary);
            stroke-dasharray: none;
            /* 解锁后变成高亮实线 */
            filter: drop-shadow(0 0 6px rgba(78, 205, 196, 0.5));
        }

        /* 关卡节点（坐标与SVG曲线完美对应） */
        .node-wrapper {
            position: absolute;
            width: 90px;
            text-align: center;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .node-0 {
            top: 10%;
            left: 50%;
        }

        .node-1 {
            top: 35%;
            left: 80%;
        }

        .node-2 {
            top: 65%;
            left: 20%;
        }

        .node-3 {
            top: 90%;
            left: 50%;
        }

        .node {
            width: 75px;
            height: 75px;
            background: var(--white);
            border: 4px solid var(--grey);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* 预留插图区域 */
        .node .img-placeholder {
            width: 100%;
            height: 100%;
            background: #F8F9FA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .node-title {
            font-size: 14px;
            font-weight: 900;
            color: #555;
            margin-top: 8px;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        /* 节点状态样式 */
        .node-wrapper.locked .node {
            filter: grayscale(100%);
            opacity: 0.8;
            cursor: not-allowed;
        }

        .node-wrapper.locked .node::after {
            content: '🔒';
            position: absolute;
            font-size: 28px;
            z-index: 5;
        }

        .node-wrapper.active .node {
            border-color: var(--secondary);
            animation: pulse 2s infinite;
        }

        .node-wrapper.active .node-title {
            color: var(--secondary);
        }

        .node-wrapper.completed .node {
            border-color: var(--primary);
        }

        .node-wrapper.completed .node::after {
            content: '✅';
            position: absolute;
            font-size: 28px;
            background: rgba(255, 255, 255, 0.7);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        /* 终极奖杯 */
        .trophy-container {
            text-align: center;
            margin-top: 10px;
            position: relative;
            z-index: 10;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .trophy-icon {
            font-size: 80px;
            filter: grayscale(100%);
            opacity: 0.4;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .trophy-container.lit .trophy-icon {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.15);
            text-shadow: 0 0 30px rgba(255, 217, 61, 0.8);
        }

        .trophy-text {
            font-weight: 800;
            color: #999;
            margin-top: 15px;
            font-size: 16px;
        }

        .trophy-container.lit .trophy-text {
            color: var(--primary);
        }

        /* --- 答题区视图 --- */
        #quiz-screen {
            display: none;
            padding-bottom: 100px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            animation: popIn 0.4s;
        }

        .content {
            padding: 20px;
        }

        .q-card {
            background: var(--white);
            padding: 30px 20px 20px;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            position: relative;
            border: 3px solid #FFF;
        }

        .q-tag {
            position: absolute;
            top: -14px;
            left: 15px;
            background: var(--primary);
            color: white;
            padding: 6px 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
        }

        .q-title {
            font-size: 18px;
            line-height: 1.6;
            font-weight: 800;
            margin: 0;
            color: #333;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-book {
            background: #666;
            color: white;
            border-radius: 12px 20px 20px 12px;
            min-height: 70px;
            display: flex;
            align-items: center;
            padding: 15px 15px 15px 55px;
            position: relative;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
        }

        .option-book::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 45px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px 0 0 12px;
            border-right: 2px solid rgba(255, 255, 255, 0.15);
        }

        .option-book.selected {
            transform: translateX(5px);
            border: 3px solid white;
            box-shadow: 0 10px 25px rgba(255, 140, 105, 0.4);
            z-index: 2;
        }

        /* --- 拖拽排序专用样式 --- */
        .option-book[draggable="true"] {
            cursor: grab;
        }

        .option-book.dragging {
            opacity: 0.5;
            border: 2px dashed var(--primary) !important;
            transform: scale(0.98);
        }

        .option-book.drag-over {
            border: 2px solid var(--secondary) !important;
            background: #E0F7F5 !important;
            /* 悬浮时的提示色 */
        }
         /* 1. 核心：禁止手机端长按菜单和拖动时的页面滚动 */
.option-book {
    touch-action: none; 
    user-select: none;
    -webkit-user-select: none;
}

/* 2. 手指按住时的样式：轻微放大和阴影 */
.touch-active {
    opacity: 0.8;
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
    z-index: 999;
}

/* 3. 手指划过其他选项时的“目标”提示 */
.touch-target-hint {
    background-color: #E0F7F5 !important;
    border: 2px dashed var(--secondary) !important;
}
        .sort-badge {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            color: var(--primary);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
            z-index: 5;
        }

        .color-0 {
            background: linear-gradient(135deg, #FF9A9E, #FECFEF);
            color: #333;
        }

        .color-1 {
            background: linear-gradient(135deg, #A18CD1, #FBC2EB);
            color: #333;
        }

        .color-2 {
            background: linear-gradient(135deg, #84FAB0, #8FD3F4);
            color: #333;
        }

        .color-3 {
            background: linear-gradient(135deg, #FCCB90, #D57EEB);
            color: #333;
        }

        /* 交互反馈动画 */
        .is-wrong {
            animation: strongShake 0.5s;
            border: 4px solid #F44336 !important;
            background-color: #FFEBEE !important;
        }

        @keyframes strongShake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-10px);
            }

            40%,
            80% {
                transform: translateX(10px);
            }
        }

        .is-right {
            border: 4px solid #4CAF50 !important;
            background-color: #E8F5E9 !important;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }

        .ai-box {
            background: #FFFBE6;
            border: 2px dashed #FFE58F;
            border-radius: 15px;
            padding: 18px;
            margin-top: 25px;
            display: none;
        }

        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
            z-index: 100;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-next {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 0 #D6704F;
        }

        .btn-next:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #D6704F;
        }

        /* --- 阶段总结专属卡片 --- */
        .stage-summary-card {
            background: white;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            display: none;
            animation: popIn 0.5s;
        }

        .btn-home {
            background: var(--secondary);
            box-shadow: 0 5px 0 #3BA59C;
            margin-top: 30px;
            font-size: 18px;
            padding: 18px;
        }

        /* 模拟教师控制区 */
        .teacher-panel {
            background: #2C3E50;
            color: #FFF;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 2000;
            font-weight: bold;
        }

        .teacher-panel button {
            background: var(--primary);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
    </style>
</head>

<body>

    <div class="global-header">
        <div class="header-title">🌟 我的探险星运 🌟</div>
        <div class="star-container" id="star-bar">
        </div>
    </div>

    <div id="map-screen">
        <div class="map-intro">
            <h2>探险地图</h2>
            <p style="color:#888; font-size:13px; margin-top:5px; font-weight: bold;">集齐7颗星以上，唤醒终极金奖杯！</p>
        </div>

        <div class="river-container">
            <svg class="river-svg" viewBox="0 0 200 400" preserveAspectRatio="none">
                <path id="path-1" class="line-seg" d="M 100 40 C 160 40, 160 100, 160 140" />
                <path id="path-2" class="line-seg" d="M 160 140 C 160 200, 40 200, 40 260" />
                <path id="path-3" class="line-seg" d="M 40 260 C 40 320, 100 320, 100 360" />
            </svg>

            <div id="node-wrap-0" class="node-wrapper active node-0">
                <div class="node" onclick="enterStage(0)">
                    <div class="img-placeholder">🔍</div>
                </div>
                <div class="node-title">学情分析</div>
            </div>

            <div id="node-wrap-1" class="node-wrapper locked node-1">
                <div class="node" onclick="enterStage(1)">
                    <div class="img-placeholder">💡</div>
                </div>
                <div class="node-title">理念关</div>
            </div>

            <div id="node-wrap-2" class="node-wrapper locked node-2">
                <div class="node" onclick="enterStage(2)">
                    <div class="img-placeholder">🛠️</div>
                </div>
                <div class="node-title">工具关</div>
            </div>

            <div id="node-wrap-3" class="node-wrapper locked node-3">
                <div class="node" onclick="enterStage(3)">
                    <div class="img-placeholder">🚀</div>
                </div>
                <div class="node-title">应用关</div>
            </div>
        </div>

        <div id="final-trophy" class="trophy-container">
            <div class="trophy-icon">🏆</div>
            <div class="trophy-text">尚未达到获奖条件，继续加油！</div>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="content">
            <div id="question-view">
                <div id="q-card" class="q-card">
                    <div id="stage-tag" class="q-tag">关卡加载</div>
                    <p id="q-title" class="q-title">正在准备题目...</p>
                </div>
                <div id="options-grid" class="options-list"></div>

                <div id="ai-box" class="ai-box">
                    <div style="font-weight: 900; color: #856404; font-size: 15px; margin-bottom: 8px;">🤖 导师诊断解析：</div>
                    <div id="ai-content" style="font-size: 14px; line-height: 1.6; color: #665C47;"></div>
                </div>
            </div>

            <div id="stage-summary-view" class="stage-summary-card">
                <div style="font-size: 60px; margin-bottom: 15px;">🎉</div>
                <h2 id="summary-title" style="color: var(--primary); margin: 0 0 10px 0; font-size: 28px;">本区探索完成</h2>
                <p style="color: #666; margin-bottom: 20px; font-weight: bold;">本阶段正确答题：</p>
                <div style="font-size: 45px; font-weight: 900; color: #4CAF50; margin-bottom: 15px;" id="summary-score">
                    0/0</div>
                <p id="summary-feedback" style="font-size: 14px; color: #888; line-height: 1.6; padding: 0 10px;"></p>

                <button class="btn btn-next btn-home" style="width: 100%;" onclick="returnToMap()">返回首页 (大地图)
                    🗺️</button>
            </div>
        </div>

        <div class="footer-nav" id="quiz-footer">
            <button id="next-btn" class="btn btn-next" style="width:100%" onclick="goNext()">确认选择 ✨</button>
        </div>
    </div>

    <div class="teacher-panel">
        👨‍🏫 教师端演练：
        <button onclick="simulateTeacherUnlock()">解锁下一个关卡</button>
    </div>

    <script>
        // 关卡源数据
        const quizData = {
            "stages": [
                {
                    "id": "pre",
                    "name": "学情分析：看见自己",
                    "show_feedback": false,
                    "questions": [
                        {
                            "id": "p1",
                            "type": "single",
                            "title": "1.当幼儿、家长、教师评价同一个幼儿产生不同的评价结果时，应该看谁的评价客观就认同谁。",
                            "options": ["A.赞同", "B.不赞同", "C.不确定"],
                            "answer": "B.不赞同",
                            "analysis": "在幼儿发展评价中，幼儿、家长和教师分别处于不同的观察情境之中，因此他们对同一个幼儿的评价往往会出现差异。例如，家长更了解幼儿在家庭环境中的行为习惯，教师更熟悉幼儿在集体活动中的表现，而幼儿自身也可能表达对自己能力的认识。多主体评价的价值就在于从不同角度全面了解幼儿的发展状况，而不是简单地判断谁更“客观”。教师在面对不同评价结果时，应当进行综合分析，寻找其中的共性与差异，从而更全面地理解幼儿的发展特点。"
                        },
                        {
                            "id": "p2",
                            "type": "single",
                            "title": "2.幼儿的游戏行为都是在不真实的游戏情景中发生的，所以通过解读游戏行为来评价幼儿发展水平是不太科学的，那些行为也不是儿童的自然行为。",
                            "options": ["A.赞同", "B.不赞同", "C.不确定"],
                            "answer": "B.不赞同",
                            "analysis": "虽然游戏情境往往具有想象和虚构的特点，例如孩子会把积木当作房子、把沙子当作食物，但游戏却是幼儿最自然、最真实的学习方式。在游戏中，幼儿会主动表达自己的经验、想法和能力。例如，在建构游戏中，幼儿的空间想象、问题解决能力、合作能力以及创造力都会自然呈现。因此，通过观察和解读幼儿的游戏行为，教师能够更真实地了解幼儿的发展水平。游戏不仅不是“不真实”的行为，反而是幼儿发展评价的重要窗口。"
                        },
                        {
                            "id": "p3",
                            "type": "single",
                            "title": "3.当幼儿在建构游戏中某一方面的发展达到教育的预期目标后，教师的评价就该结束了。",
                            "options": ["A.赞同", "B.不赞同", "C.不确定"],
                            "answer": "B.不赞同",
                            "analysis": "幼儿的发展是一个持续变化、不断提升的过程，而不是在达到某一个目标后就停止。评价的目的不是简单地判断“是否达标”，而是帮助教师持续了解幼儿的发展变化。例如，当幼儿已经掌握某种建构技能后，教师可以进一步观察幼儿是否能够在新的情境中灵活运用、是否能够进行更复杂的创造。因此，评价应该是持续性的过程，通过不断观察和记录，教师才能更准确地支持幼儿的发展。"
                        },
                        {
                            "id": "p4",
                            "type": "single",
                            "title": "4.评价幼儿的游戏行为时，要时刻树立“后期经验是否比前期经验增长了”的对比意识，否则“通过游戏来学习”的发展目标就落空了。",
                            "options": ["A.赞同", "B.不赞同", "C.不确定"],
                            "answer": "A.赞同",
                            "analysis": "幼儿评价的重要原则之一是“发展性评价”，也就是关注幼儿的发展变化。教师在观察游戏行为时，不应只看某一时刻的表现，而应该比较幼儿前后经验的变化。例如，幼儿最初可能只是简单地堆积积木，但经过多次游戏后，可能开始有计划地搭建房屋结构，这就是明显的发展。通过前后对比，教师可以更清晰地看到幼儿学习的过程和成长的轨迹，从而更好地支持幼儿继续发展。"
                        }
                    ]
                },
                {
                    "id": "s1",

        const TOTAL_STARS = 10;
        let globalStarsEarned = 0;
        let currentSIdx = 0;
        let currentQIdx = 0;

        // 核心安全记录器：防止反复答题刷星
        let earnedStarsRecord = new Set();

        let stageStatus = ['active', 'locked', 'locked', 'locked'];
        let userAnswers = {};
        let isSubmitted = false;

        // 1. 渲染顶部10颗星星
        function initStars() {
            const container = document.getElementById('star-bar');
            container.innerHTML = '';
            for (let i = 0; i < TOTAL_STARS; i++) {
                container.innerHTML += `<span class="star" id="star-${i}">★</span>`;
            }
        }

        // 2. 点亮星星逻辑
        function addStar() {
            if (globalStarsEarned < TOTAL_STARS) {
                const star = document.getElementById(`star-${globalStarsEarned}`);
                star.classList.add('lit');
                globalStarsEarned++;
            }
        }

        // 3. 终极奖杯校验
        function checkTrophy() {
            const trophy = document.getElementById('final-trophy');
            // 是否完成了最后一个关卡
            const allDone = stageStatus[3] === 'completed';

            if (globalStarsEarned >= 7) {
                trophy.classList.add('lit');
                trophy.querySelector('.trophy-text').innerText = "🏆 完美通关！荣获闪耀金奖杯 🏆";
            } else if (allDone && globalStarsEarned < 7) {
                trophy.querySelector('.trophy-text').innerText = "闯关结束，星星不足，奖杯未被点亮~";
            }
        }

        // 4. 从地图进入关卡
        function enterStage(idx) {
            if (stageStatus[idx] === 'locked') {
                alert("🔒 该区域暂未开放，请等待导师解锁！");
                return;
            }
            if (stageStatus[idx] === 'completed') {
                alert("✅ 该区域探测已完成，数据已上传，不可重复进入。");
                return;
            }

            currentSIdx = idx;
            currentQIdx = 0;

            document.getElementById('map-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('stage-summary-view').style.display = 'none';
            document.getElementById('question-view').style.display = 'block';
            document.getElementById('quiz-footer').style.display = 'flex';

            renderQuiz();
        }

        // 5. 渲染单道题目
        function renderQuiz() {
            const stage = quizData.stages[currentSIdx];
            const q = stage.questions[currentQIdx];
            const nextBtn = document.getElementById('next-btn');

            isSubmitted = false;
            document.getElementById('ai-box').style.display = 'none';
            document.getElementById('q-card').className = 'q-card';
            document.getElementById('stage-tag').innerText = "📍 " + stage.name;
            document.getElementById('q-title').innerText = q.title;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            const userChoice = userAnswers[q.id];
            const listToRender = q.type === 'sort' ? (userChoice || [...q.options]) : q.options;

            // 记录触摸状态的临时变量
        let touchStartIndex = null;
        let currentTargetIndex = null;

        listToRender.forEach((opt, i) => {
            const book = document.createElement('div');
            book.className = `option-book color-${i % 4}`;
            
            if (q.type === 'sort' && !isSubmitted) {
                // --- 手机端触摸拖拽逻辑 ---
                book.dataset.index = i;

                // A. 手指按下：记录起始位置
                book.ontouchstart = (e) => {
                    touchStartIndex = i;
                    book.classList.add('touch-active');
                };

                // B. 手指移动：寻找当前手指下方的选项
                book.ontouchmove = (e) => {
                    const touch = e.touches[0];
                    // 获取手指坐标下的元素
                    // 暂时隐藏当前元素，否则 elementFromPoint 永远只抓到自己
                    book.style.visibility = 'hidden'; 
                    const elementUnderFinger = document.elementFromPoint(touch.clientX, touch.clientY);
                    book.style.visibility = 'visible';

                    const targetBook = elementUnderFinger ? elementUnderFinger.closest('.option-book') : null;

                    // 清除所有选项的提示样式
                    document.querySelectorAll('.option-book').forEach(b => b.classList.remove('touch-target-hint'));

                    if (targetBook && targetBook !== book) {
                        targetBook.classList.add('touch-target-hint');
                        currentTargetIndex = parseInt(targetBook.dataset.index);
                    } else {
                        currentTargetIndex = null;
                    }
                };

                // C. 手指抬起：执行位置交换
                book.ontouchend = () => {
                    book.classList.remove('touch-active');
                    document.querySelectorAll('.option-book').forEach(b => b.classList.remove('touch-target-hint'));

                    if (currentTargetIndex !== null && currentTargetIndex !== touchStartIndex) {
                        // 更新答案数组
                        let list = userAnswers[q.id] ? [...userAnswers[q.id]] : [...q.options];
                        // 执行位置互换
                        const [movedItem] = list.splice(touchStartIndex, 1);
                        list.splice(currentTargetIndex, 0, movedItem);
                        
                        userAnswers[q.id] = list;
                        renderQuiz(); // 重新渲染页面
                    }
                    touchStartIndex = null;
                    currentTargetIndex = null;
                };

                // 排序题的内容显示
                book.innerHTML = `<div class="sort-badge">${i+1}</div> <span>${opt}</span>`;
            } else {
                // --- 非排序题或已提交：保持原有的点击逻辑 ---
                const prefix = ["A", "B", "C", "D"][i] || "🔹";
                book.innerHTML = `<span style="position:absolute; left:18px; font-weight:900; font-size:18px; opacity:0.8;">${prefix}</span> <span>${opt.substring(opt.indexOf('.')+1 || 0)}</span>`;
                
                if (q.type === 'multi') {
                    if (userChoice && userChoice.includes(opt)) book.classList.add('selected');
                } else {
                    if (userChoice === opt) book.classList.add('selected');
                }
                book.onclick = () => handleOptionClick(q, opt, i, listToRender);
            }
            grid.appendChild(book);
        });
            nextBtn.innerText = "确认选择 ✨";
        }

        function handleOptionClick(q, opt, index, list) {
            if (isSubmitted) return;
            if (q.type === 'sort') {
            }
            else if (q.type === 'multi') {
                if (!userAnswers[q.id]) userAnswers[q.id] = [];
                const idx = userAnswers[q.id].indexOf(opt);
                if (idx > -1) userAnswers[q.id].splice(idx, 1);
                else userAnswers[q.id].push(opt);
            } else {
                userAnswers[q.id] = opt;
            }
            renderQuiz();
        }
        // 新增：处理拖拽排序的逻辑
        function handleSort(q, fromIndex, toIndex) {
            if (fromIndex === toIndex) return;

            // 获取当前顺序（如果还没操作过，则复制初始选项）
            let list = userAnswers[q.id] ? [...userAnswers[q.id]] : [...q.options];

            // 执行自由互换：移除被拖拽项并插入到新位置
            const [movedItem] = list.splice(fromIndex, 1);
            list.splice(toIndex, 0, movedItem);

            userAnswers[q.id] = list;
            renderQuiz();
        }
        // 6. 提交判题与流转
        function goNext() {
            const stage = quizData.stages[currentSIdx];
            const q = stage.questions[currentQIdx];

            if (!userAnswers[q.id] && q.type !== 'sort') {
                alert("请先做出你的选择！"); return;
            }

            // 第一次点击：处理提交逻辑
            if (!isSubmitted) {
                const ans = userAnswers[q.id];
                let correct = false;

                // 标准判题逻辑
                if (q.type === 'multi') correct = JSON.stringify([...(ans || [])].sort()) === JSON.stringify([...q.answer].sort());
                else if (q.type === 'sort') correct = JSON.stringify(ans || q.options) === JSON.stringify(q.answer);
                else correct = (ans === q.answer);

                const card = document.getElementById('q-card');

                // --- 分支处理：如果是“学情分析(pre)”，进入静默模式 ---
                if (stage.id === 'pre' || stage.show_feedback === false) {
                    // 1. 不添加 is-right 或 is-wrong 的颜色类
                    // 2. 不调用 addStar()
                    // 3. 不显示 ai-box 解析
                    console.log("学情分析模式：数据已记录，无反馈");
                }
                // --- 正常关卡：显示反馈和星星 ---
                else {
                    if (correct) {
                        card.classList.add('is-right');
                        // 只有正确且从未领过星才发星
                        if (!earnedStarsRecord.has(q.id)) {
                            earnedStarsRecord.add(q.id);
                            addStar();
                        }
                    } else {
                        card.classList.add('is-wrong');
                    }
                    // 显示解析框
                    document.getElementById('ai-box').style.display = 'block';
                    document.getElementById('ai-content').innerText = q.analysis;
                }

                isSubmitted = true;
                document.getElementById('next-btn').innerText = "下一题 ➡️";
                return;
            }

            // 第二次点击：翻页或结束
            if (currentQIdx < stage.questions.length - 1) {
                currentQIdx++;
                renderQuiz();
            } else {
                showStageSummary(stage);
            }
        }

        // 7. 阶段专属结算页
        function showStageSummary(stage) {
            document.getElementById('question-view').style.display = 'none';
            document.getElementById('quiz-footer').style.display = 'none';
            document.getElementById('stage-summary-view').style.display = 'block';

            let stageScore = 0;
            stage.questions.forEach(q => {
                const u = userAnswers[q.id];
                if (!u) return;
                if (q.type === 'multi' && JSON.stringify([...u].sort()) === JSON.stringify([...q.answer].sort())) stageScore++;
                else if (q.type === 'sort' && JSON.stringify(u) === JSON.stringify(q.answer)) stageScore++;
                else if (u === q.answer) stageScore++;
            });

            document.getElementById('summary-title').innerText = `${stage.name} 已完成`;
            document.getElementById('summary-score').innerText = `${stageScore} / ${stage.questions.length}`;

            if (currentSIdx === 0) {
                document.getElementById('summary-feedback').innerText = "热身结束！请返回首页等待导师发布新任务。";
            } else {
                document.getElementById('summary-feedback').innerText = "太棒了，您的答题数据已安全记录。";
            }

            // 标记完成
            stageStatus[currentSIdx] = 'completed';
            checkTrophy();
        }

        // 8. 结算页的返回按钮
        function returnToMap() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('map-screen').style.display = 'block';
            updateMapUI();
        }

        // 9. 更新地图 SVG 线段和节点
        function updateMapUI() {
            for (let i = 0; i < 4; i++) {
                const wrap = document.getElementById(`node-wrap-${i}`);
                wrap.className = `node-wrapper node-${i} ${stageStatus[i]}`;

                // 如果完成了该节点，点亮它流向下一关的SVG河流
                if (stageStatus[i] === 'completed' && i < 3) {
                    const svgPath = document.getElementById(`path-${i + 1}`);
                    if (svgPath) svgPath.classList.add('lit');
                }
            }
        }

        // --- 模拟导师功能 ---
        function simulateTeacherUnlock() {
            const nextLockedIdx = stageStatus.indexOf('locked');
            if (nextLockedIdx !== -1) {
                stageStatus[nextLockedIdx] = 'active';
                updateMapUI();
                alert(`✅ 模拟导师端：已下发【${quizData.stages[nextLockedIdx].name}】的访问权限！请点击发光节点进入。`);
            } else {
                alert("所有区域均已解锁完毕！");
            }
        }

        // 初始化运行
        initStars();
        updateMapUI();

    </script>
